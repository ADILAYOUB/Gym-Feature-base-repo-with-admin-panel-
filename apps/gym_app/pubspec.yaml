name: gym_app
description: "Main Gym App Entry Point."
publish_to: 'none'
version: 1.0.0+1
resolution: workspace

environment:
  sdk: '^3.11.4'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0

  # Workspace Local Dependencies
  domain:
    path: ../../packages/domain
  core_ui:
    path: ../../packages/core_ui
  sdui:
    path: ../../packages/sdui
  data:
    path: ../../packages/data
  auth:
    path: ../../packages/features/auth
  workout:
    path: ../../packages/features/workout
  admin:
    path: ../../packages/features/admin

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
